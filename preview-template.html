<!DOCTYPE html>
<html>
<head>
    <title>Preview - Separate Window</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding: 20px; background: #f0f0f0; height: 100vh; }
        .preview-grid {
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            min-height: 100%;
            resize: both;
            overflow: auto;
        }
        .preview-grid > * {
            border: 1px solid #999;
            background: rgba(255,255,255,0.9);
            padding: 8px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="previewGridClone" class="preview-grid"></div>
    <script>
        (function() {
            const data = localStorage.getItem('previewContent');
            if (data) {
                const { html, style, childrenStyles } = JSON.parse(data);
                const clone = document.getElementById('previewGridClone');
                clone.innerHTML = html;
                clone.style.cssText = style;
                const children = clone.children;
                for (let i = 0; i < children.length; i++) {
                    if (childrenStyles[i]) children[i].style.cssText = childrenStyles[i];
                }
                localStorage.removeItem('previewContent');
            }
        })();
    </script>
</body>
</html>
